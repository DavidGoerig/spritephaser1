<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frise Chronologique — Les Élus, le Voile et l'Empire des Fées</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --bg2: #12121a;
      --bg3: #1a1a25;
      --border: #2a2a40;
      --text: #d0d0e0;
      --text-dim: #707090;
      --accent: #8060ff;
      --accent2: #60a0ff;
      --panel-w: 380px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ─────────────────────────────────────── */
    #header {
      padding: 14px 20px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    #header h1 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.5px;
    }
    #header span {
      font-size: 12px;
      color: var(--text-dim);
    }
    #back-btn {
      margin-left: auto;
      padding: 6px 14px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 12px;
      text-decoration: none;
    }
    #back-btn:hover { background: var(--bg); color: var(--text); }

    /* ── MAIN LAYOUT ─────────────────────────────────── */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── TIMELINE AREA ───────────────────────────────── */
    #timeline-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* ── ERA BANDS ───────────────────────────────────── */
    #era-bar {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      height: 28px;
      position: relative;
    }

    .era-segment {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      text-transform: uppercase;
      border-right: 1px solid var(--border);
      overflow: hidden;
      white-space: nowrap;
    }

    /* ── SCROLL WRAPPER ──────────────────────────────── */
    #scroll-outer {
      flex: 1;
      overflow-x: auto;
      overflow-y: hidden;
      position: relative;
    }
    #scroll-outer::-webkit-scrollbar { height: 6px; }
    #scroll-outer::-webkit-scrollbar-track { background: var(--bg2); }
    #scroll-outer::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── TIMELINE SVG CANVAS ─────────────────────────── */
    #timeline-canvas {
      position: relative;
      height: 100%;
    }

    /* ── AXIS LINE ───────────────────────────────────── */
    .axis-line {
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 2px;
      background: linear-gradient(to right, transparent, var(--border) 5%, var(--border) 95%, transparent);
      transform: translateY(-50%);
    }

    /* ── YEAR TICKS ──────────────────────────────────── */
    .year-tick {
      position: absolute;
      top: 50%;
      width: 1px;
      height: 8px;
      background: var(--border);
      transform: translateX(-50%) translateY(-50%);
    }
    .year-label {
      position: absolute;
      top: calc(50% + 14px);
      transform: translateX(-50%);
      font-size: 10px;
      color: var(--text-dim);
      white-space: nowrap;
    }

    /* ── EVENT NODE ──────────────────────────────────── */
    .event-node {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      cursor: pointer;
      z-index: 10;
    }

    .event-node .node-circle {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid currentColor;
      background: var(--bg2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: all 0.2s;
      box-shadow: 0 0 0 0px currentColor;
    }

    .event-node:hover .node-circle,
    .event-node.active .node-circle {
      background: var(--bg3);
      box-shadow: 0 0 0 3px currentColor, 0 0 20px currentColor;
      transform: scale(1.1);
    }

    .event-node .node-label {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      font-size: 11px;
      font-weight: 600;
      color: var(--text);
      text-shadow: 0 0 8px var(--bg);
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .event-node .node-year {
      position: absolute;
      top: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      font-size: 10px;
      color: currentColor;
      opacity: 0.8;
    }

    .event-node:hover .node-label,
    .event-node.active .node-label {
      opacity: 1;
    }

    /* ── "TODAY" MARKER ──────────────────────────────── */
    #today-marker {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(to bottom, transparent, #e04040 40%, #e04040 60%, transparent);
      z-index: 5;
    }
    #today-marker::after {
      content: "AUJOURD'HUI";
      position: absolute;
      bottom: 15px;
      left: 6px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #e04040;
      white-space: nowrap;
    }

    /* ── DETAIL PANEL ────────────────────────────────── */
    #detail-panel {
      width: var(--panel-w);
      background: var(--bg2);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
      transition: transform 0.3s;
    }

    #detail-panel.hidden {
      transform: translateX(var(--panel-w));
    }

    #panel-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #panel-event-name {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    #panel-meta {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .meta-chip {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      background: var(--bg3);
      border: 1px solid var(--border);
      white-space: nowrap;
    }

    .meta-chip.year { color: #ff9040; border-color: #ff9040; }
    .meta-chip.region { color: #40c080; border-color: #40c080; }
    .meta-chip.arc { color: var(--accent); border-color: var(--accent); }

    #panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }
    #panel-body::-webkit-scrollbar { width: 4px; }
    #panel-body::-webkit-scrollbar-track { background: var(--bg2); }
    #panel-body::-webkit-scrollbar-thumb { background: var(--border); }

    .section-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--text-dim);
      text-transform: uppercase;
      margin: 0 0 8px 0;
    }

    #panel-description {
      font-size: 13px;
      line-height: 1.7;
      color: var(--text);
      margin-bottom: 20px;
      white-space: pre-line;
    }

    #panel-consequence {
      font-size: 12px;
      line-height: 1.6;
      color: #a0a0c0;
      padding: 10px;
      background: var(--bg3);
      border-left: 2px solid var(--accent);
      border-radius: 0 4px 4px 0;
      margin-bottom: 20px;
    }

    /* ── CHARACTERS LIST ─────────────────────────────── */
    #panel-characters {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .char-card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .char-card:hover {
      border-color: var(--accent);
      background: var(--bg);
    }

    .char-card-name {
      font-size: 14px;
      font-weight: 600;
    }

    .char-card-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .char-role {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      background: rgba(128,96,255,0.15);
      color: var(--accent);
      border: 1px solid rgba(128,96,255,0.3);
    }

    .char-faction {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      border: 1px solid;
    }

    .char-card-desc {
      font-size: 11px;
      color: var(--text-dim);
      line-height: 1.4;
    }

    /* ── CLOSE BUTTON ────────────────────────────────── */
    #panel-close {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 28px;
      height: 28px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #panel-close:hover { color: var(--text); background: var(--bg); }

    /* ── LEGEND ──────────────────────────────────────── */
    #legend {
      position: absolute;
      bottom: 12px;
      left: 20px;
      display: flex;
      gap: 12px;
      z-index: 20;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      color: var(--text-dim);
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 2px solid currentColor;
      flex-shrink: 0;
    }

    /* ── HELP TEXT ───────────────────────────────────── */
    #help-hint {
      position: absolute;
      bottom: 10px;
      right: calc(var(--panel-w) + 10px);
      font-size: 11px;
      color: var(--text-dim);
      z-index: 20;
    }

    #detail-panel.hidden ~ #help-hint {
      right: 10px;
    }

    /* ── SCROLLBAR HINT ──────────────────────────────── */
    #scroll-hint {
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      color: var(--text-dim);
      pointer-events: none;
      opacity: 0.6;
    }
  </style>
</head>
<body>

<div id="header">
  <h1>FRISE CHRONOLOGIQUE</h1>
  <span>Les Élus, le Voile et l'Empire des Fées</span>
  <a href="/characters/" id="back-btn">← Retour au Character Bank</a>
</div>

<div id="main">
  <div id="timeline-area">
    <div id="era-bar"><!-- Rempli par JS --></div>
    <div id="scroll-outer">
      <div id="timeline-canvas">
        <div id="scroll-hint">← Défilez horizontalement →</div>
        <div class="axis-line"></div>
        <div id="today-marker"></div>
        <!-- Events et ticks injectés par JS -->
      </div>
    </div>
    <div id="legend"></div>
    <div id="help-hint">Cliquez sur un événement pour voir les personnages impliqués</div>
  </div>

  <div id="detail-panel" class="hidden">
    <div id="panel-header" style="position:relative;">
      <div id="panel-event-name"></div>
      <div id="panel-meta"></div>
      <button id="panel-close">×</button>
    </div>
    <div id="panel-body">
      <p class="section-title">Description</p>
      <div id="panel-description"></div>
      <p class="section-title">Conséquence visible aujourd'hui</p>
      <div id="panel-consequence"></div>
      <p class="section-title">Personnages impliqués</p>
      <div id="panel-characters"></div>
    </div>
  </div>
</div>

<script type="module">
import {
  EVENTS, ERAS, REGION_COLORS, FACTION_COLORS, CHARACTERS_INDEX
} from './timeline-data.js';

// ── CONFIGURATION ─────────────────────────────────────────
const YEAR_START = -360;
const YEAR_END   = 10;
const TOTAL_YEARS = YEAR_END - YEAR_START;  // 370
const PX_PER_YEAR = 8;                       // zoom
const PADDING_H  = 80;                       // px left/right
const CANVAS_W   = TOTAL_YEARS * PX_PER_YEAR + PADDING_H * 2;
const AXIS_Y_PCT = 42;                       // % from top

// ── DOM REFS ──────────────────────────────────────────────
const canvas     = document.getElementById('timeline-canvas');
const eraBar     = document.getElementById('era-bar');
const scrollOuter = document.getElementById('scroll-outer');
const panel      = document.getElementById('detail-panel');
const panelName  = document.getElementById('panel-event-name');
const panelMeta  = document.getElementById('panel-meta');
const panelDesc  = document.getElementById('panel-description');
const panelCons  = document.getElementById('panel-consequence');
const panelChars = document.getElementById('panel-characters');
const legend     = document.getElementById('legend');
const closeBtn   = document.getElementById('panel-close');

// ── HELPERS ───────────────────────────────────────────────
function yearToX(year) {
  return PADDING_H + (year - YEAR_START) * PX_PER_YEAR;
}

function pct(v, total) {
  return (v / total * 100).toFixed(2) + '%';
}

// ── SETUP CANVAS SIZE ─────────────────────────────────────
canvas.style.width  = CANVAS_W + 'px';
canvas.style.minWidth = CANVAS_W + 'px';

// ── ERA BANDS ─────────────────────────────────────────────
ERAS.forEach(era => {
  const el = document.createElement('div');
  el.className = 'era-segment';
  const w = (era.end - era.start) / TOTAL_YEARS * 100;
  el.style.cssText = `
    width: ${w}%;
    background: ${era.color};
  `;
  el.textContent = era.label;
  eraBar.appendChild(el);
});

// ── YEAR TICKS ────────────────────────────────────────────
for (let y = YEAR_START; y <= YEAR_END; y += 50) {
  const tick = document.createElement('div');
  tick.className = 'year-tick';
  tick.style.left = yearToX(y) + 'px';
  canvas.appendChild(tick);

  const lbl = document.createElement('div');
  lbl.className = 'year-label';
  lbl.textContent = y === 0 ? 'An 0' : `An ${y}`;
  lbl.style.left = yearToX(y) + 'px';
  canvas.appendChild(lbl);
}

// ── TODAY MARKER ──────────────────────────────────────────
const todayX = yearToX(0);
const todayEl = document.getElementById('today-marker');
todayEl.style.left = todayX + 'px';

// ── EVENTS ────────────────────────────────────────────────
let activeNode = null;

EVENTS.forEach(ev => {
  const color = REGION_COLORS[ev.region] || '#808080';
  const x = yearToX(ev.annee);

  const node = document.createElement('div');
  node.className = 'event-node';
  node.style.left = x + 'px';
  node.style.top  = '50%';
  node.style.color = color;

  node.innerHTML = `
    <div class="node-label">${ev.titre}</div>
    <div class="node-circle">${ev.emoji}</div>
    <div class="node-year">An ${ev.annee}</div>
  `;

  node.addEventListener('click', () => openPanel(ev, node));
  canvas.appendChild(node);
});

// ── LEGEND ────────────────────────────────────────────────
const regionsSeen = new Set(EVENTS.map(e => e.region));
regionsSeen.forEach(region => {
  const color = REGION_COLORS[region] || '#808080';
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.style.color = color;
  item.innerHTML = `<div class="legend-dot" style="border-color:${color}"></div>${region}`;
  legend.appendChild(item);
});

// ── PANEL ─────────────────────────────────────────────────
function openPanel(ev, node) {
  // deactivate previous
  if (activeNode) activeNode.classList.remove('active');
  activeNode = node;
  node.classList.add('active');

  const color = REGION_COLORS[ev.region] || '#808080';
  const arcLabel = ev.arc?.replace(/_/g, ' ') || '—';

  panelName.textContent = `${ev.emoji}  ${ev.titre}`;
  panelName.style.color = color;

  panelMeta.innerHTML = `
    <span class="meta-chip year">An ${ev.annee}</span>
    <span class="meta-chip region" style="color:${color};border-color:${color}20">${ev.region}</span>
    <span class="meta-chip arc">Arc : ${arcLabel}</span>
  `;

  panelDesc.textContent = ev.long;
  panelCons.textContent = ev.consequence;

  panelChars.innerHTML = '';
  (ev.personnages || []).forEach(ch => {
    const info = CHARACTERS_INDEX[ch.id] || {};
    const factionColor = FACTION_COLORS[ch.faction] || '#808080';

    const card = document.createElement('div');
    card.className = 'char-card';
    card.innerHTML = `
      <div class="char-card-name">${ch.nom}</div>
      <div class="char-card-meta">
        <span class="char-role">${ch.role}</span>
        <span class="char-faction" style="color:${factionColor};border-color:${factionColor}40;background:${factionColor}15">${ch.faction}</span>
        ${info.element ? `<span class="meta-chip">${info.element}</span>` : ''}
      </div>
    `;

    // Navigate to character bank on click
    card.addEventListener('click', () => {
      const url = `/characters/?char=${ch.id}`;
      window.location.href = url;
    });

    panelChars.appendChild(card);
  });

  panel.classList.remove('hidden');

  // Scroll event into view
  const nodeX = yearToX(ev.annee);
  const outerW = scrollOuter.clientWidth;
  const panelW = panel.offsetWidth;
  const targetScroll = nodeX - (outerW - panelW) / 2;
  scrollOuter.scrollTo({ left: targetScroll, behavior: 'smooth' });
}

closeBtn.addEventListener('click', () => {
  panel.classList.add('hidden');
  if (activeNode) {
    activeNode.classList.remove('active');
    activeNode = null;
  }
});

// ── INITIAL SCROLL POSITION ───────────────────────────────
// Centrer sur an -100 au démarrage
scrollOuter.scrollLeft = yearToX(-150) - scrollOuter.clientWidth / 2;
</script>
</body>
</html>
